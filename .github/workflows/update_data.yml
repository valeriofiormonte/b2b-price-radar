name: Radar Professional Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installa Browser e Dipendenze
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Esecuzione Crawler
        run: python scraper.py

      - name: Salva i risultati su GitHub
        run: |
          git config --global user.name "RadarBot"
          git config --global user.email "bot@radar.com"
          git add data.json
          git commit -m "Aggiornamento prezzi: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
