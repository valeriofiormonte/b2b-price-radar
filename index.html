<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar Prezzi — B2B Multi-Settore</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
            }
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #f8fafc; }
    .sector-btn.active { 
      background-color: #16a34a; 
      color: white; 
      border-color: #16a34a; 
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
    }
    .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-slate-900 antialiased">

  <header class="py-12 px-6">
    <div class="max-w-4xl mx-auto text-center">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-100 text-brand-700 text-xs font-bold mb-6 animate-fade-up">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-500 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-brand-600"></span>
        </span>
        LIVE PREZZI B2B
      </div>
      
      <h1 class="text-5xl md:text-6xl font-display font-extrabold tracking-tight mb-4 animate-fade-up">
        Radar Prezzi <span class="text-brand-600">B2B</span>
      </h1>
      <p class="text-slate-500 text-lg max-w-2xl mx-auto mb-10 animate-fade-up">
        Confronta prezzi e disponibilità dai principali fornitori in tempo reale.
      </p>

      <div class="flex justify-center gap-4 mb-10 animate-fade-up" style="animation-delay: 0.1s">
        <button id="filter-tech" onclick="switchSector('Elettronica')" class="sector-btn active px-6 py-2 rounded-full border-2 border-slate-200 font-bold transition-all flex items-center gap-2">
          🏢 Industriale
        </button>
        <button id="filter-food" onclick="switchSector('Ristorazione')" class="sector-btn px-6 py-2 rounded-full border-2 border-slate-200 text-slate-500 font-bold transition-all flex items-center gap-2">
          👨‍🍳 Ristorazione
        </button>
      </div>

      <div class="max-w-2xl mx-auto relative animate-fade-up" style="animation-delay: 0.2s">
        <div class="flex gap-2 p-2 bg-white rounded-2xl shadow-xl border border-slate-100">
          <input type="text" id="searchInput" placeholder="Cerca codice o prodotto..." 
            class="flex-1 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 font-medium">
          <button id="searchBtn" class="bg-brand-600 hover:bg-brand-700 text-white px-8 py-3 rounded-xl font-bold transition-all">
            Cerca
          </button>
        </div>
        <div id="quickChips" class="flex flex-wrap gap-2 mt-4 justify-center">
          </div>
      </div>
    </div>
  </header>

  <main id="resultsArea" class="hidden max-w-6xl mx-auto px-6 pb-20">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-6 border-b border-slate-50 flex justify-between items-center">
          <h2 class="font-display text-xl" id="resultTitle">Dettagli Fornitori</h2>
          <span class="text-xs font-mono text-slate-400" id="resultMpn">--</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50/50 text-slate-500 text-xs uppercase font-bold tracking-wider">
              <tr>
                <th class="px-6 py-4">Fornitore</th>
                <th class="px-6 py-4 text-right">Prezzo Unit.</th>
                <th class="px-6 py-4">Stock</th>
                <th class="px-6 py-4">Link</th>
              </tr>
            </thead>
            <tbody id="priceTableBody" class="divide-y divide-slate-50">
              </tbody>
          </table>
        </div>
      </div>

      <div class="space-y-6">
        <div class="bg-brand-600 text-white rounded-3xl p-8 shadow-lg shadow-brand-200">
          <h3 class="text-lg font-bold mb-4">Calcolatore Risparmio</h3>
          <label class="block text-xs uppercase opacity-75 mb-2 font-bold">Quantità Ordine</label>
          <input type="number" id="qtyInput" value="1" min="1" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-white/50 mb-6">
          
          <div class="space-y-3 border-t border-white/10 pt-6">
            <div class="flex justify-between items-center">
              <span class="opacity-80">Miglior Prezzo</span>
              <span class="font-bold text-xl" id="bestTotal">€ 0.00</span>
            </div>
            <div class="flex justify-between items-center text-brand-100">
              <span>Risparmio Stimato</span>
              <span class="font-bold text-2xl" id="savingsAmount">€ 0.00</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    let catalogData = [];
    let currentSector = 'Elettronica';
    const searchInput = document.getElementById('searchInput');
    const quickChips = document.getElementById('quickChips');
    const resultsArea = document.getElementById('resultsArea');

    async function loadData() {
      try {
        const res = await fetch('./data.json');
        catalogData = await res.json();
        renderQuickChips();
      } catch (e) {
        console.error("Errore caricamento dati:", e);
      }
    }

    function switchSector(sector) {
      currentSector = sector;
      document.querySelectorAll('.sector-btn').forEach(btn => btn.classList.remove('active'));
      if(sector === 'Elettronica') document.getElementById('filter-tech').classList.add('active');
      else document.getElementById('filter-food').classList.add('active');
      
      searchInput.value = '';
      resultsArea.classList.add('hidden');
      renderQuickChips();
    }

    function renderQuickChips() {
      quickChips.innerHTML = '<span class="text-xs text-slate-400 self-center">Esempi:</span>';
      const filtered = catalogData.filter(item => item.categoria === currentSector);
      filtered.slice(0, 5).forEach(item => {
        const btn = document.createElement('button');
        btn.className = "text-xs font-mono px-3 py-1 rounded-full border border-slate-200 text-slate-600 bg-white hover:border-brand-500 hover:text-brand-600 transition-all";
        btn.textContent = item.mpn;
        btn.onclick = () => { searchInput.value = item.mpn; performSearch(item.mpn); };
        quickChips.appendChild(btn);
      });
    }

    function performSearch(query) {
      const item = catalogData.find(i => i.mpn.toLowerCase().includes(query.toLowerCase()));
      if (!item) return alert("Prodotto non trovato");

      resultsArea.classList.remove('hidden');
      document.getElementById('resultTitle').textContent = item.nome;
      document.getElementById('resultMpn').textContent = item.mpn;
      
      const tbody = document.getElementById('priceTableBody');
      tbody.innerHTML = '';
      
      const sortedFornitori = [...item.fornitori].sort((a,b) => a.prezzo_unitario - b.prezzo_unitario);
      
      sortedFornitori.forEach((f, index) => {
        const row = document.createElement('tr');
        row.className = index === 0 ? "bg-brand-50/50" : "";
        row.innerHTML = `
          <td class="px-6 py-4 font-bold">${f.nome} ${index === 0 ? '🏆' : ''}</td>
          <td class="px-6 py-4 text-right font-mono font-bold">€ ${f.prezzo_unitario.toFixed(2)}</td>
          <td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs ${f.disponibilita > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${f.disponibilita} pz</span></td>
          <td class="px-6 py-4"><a href="${f.url}" class="text-brand-600 hover:underline">Vedi</a></td>
        `;
        tbody.appendChild(row);
      });

      updateCalculator(item);
    }

    function updateCalculator(item) {
      if(!item) return;
      const qty = document.getElementById('qtyInput').value || 1;
      const sorted = [...item.fornitori].sort((a,b) => a.prezzo_unitario - b.prezzo_unitario);
      const best = sorted[0].prezzo_unitario * qty;
      const worst = sorted[sorted.length-1].prezzo_unitario * qty;
      
      document.getElementById('bestTotal').textContent = `€ ${best.toFixed(2)}`;
      document.getElementById('savingsAmount').textContent = `€ ${(worst - best).toFixed(2)}`;
    }

    document.getElementById('searchBtn').onclick = () => performSearch(searchInput.value);
    searchInput.onkeydown = (e) => { if(e.key === 'Enter') performSearch(searchInput.value); };

    loadData();
  </script>
</body>
</html>
